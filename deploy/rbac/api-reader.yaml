apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-job-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-job-ui-reader
rules:
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments", "flinksessionjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-job-ui-reader-binding
subjects:
  - kind: ServiceAccount
    name: flink-job-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-job-ui-reader

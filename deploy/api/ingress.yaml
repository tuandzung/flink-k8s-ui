apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flink-job-ui
  annotations:
    flink-job-ui.io/auth-owner: app-oidc-session
    flink-job-ui.io/public-surface: signed-out-shell-auth-and-api
    flink-job-ui.io/metrics-policy: excluded-from-public-ingress
    # This ingress is only the public traffic entrypoint. Terminate TLS here and
    # forward the canonical host so the app can complete /auth/login redirects and
    # /auth/callback handling correctly.
spec:
  rules:
    - host: flink-jobs.example.com
      http:
        paths:
          # This public ingress fronts the signed-out shell, auth endpoints, and
          # authenticated UI/API traffic. Do not publish /metrics on this ingress.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flink-job-ui
                port:
                  number: 80

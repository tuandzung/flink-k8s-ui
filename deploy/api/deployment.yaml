apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-job-ui
  annotations:
    flink-job-ui.io/runtime: rust
    flink-job-ui.io/auth-owner: app-oidc-session
    flink-job-ui.io/metrics-policy: internal-service-only
    flink-job-ui.io/public-surface: signed-out-shell-auth-and-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-job-ui
  template:
    metadata:
      labels:
        app: flink-job-ui
        app.kubernetes.io/runtime: rust
      annotations:
        flink-job-ui.io/auth-owner: app-oidc-session
    spec:
      serviceAccountName: flink-job-ui
      containers:
        - name: api
          image: flink-job-ui:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["./apps/api-rs/flink-job-ui-api"]
          env:
            - name: PORT
              value: "3000"
            - name: FIXTURE_MODE
              value: "false"
            - name: OIDC_ISSUER_URL
              value: "https://accounts.example.com/realms/platform"
            - name: OIDC_CLIENT_ID
              value: "flink-job-ui"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: flink-job-ui-oidc
                  key: client-secret
            - name: OIDC_EXTERNAL_BASE_URL
              value: "https://flink-jobs.example.com"
            - name: OIDC_CALLBACK_PATH
              value: "/auth/callback"
            - name: OIDC_SCOPES
              value: "openid profile email"
            - name: SESSION_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: flink-job-ui-oidc
                  key: session-secret
            - name: SESSION_TTL_SECS
              value: "28800"
            - name: SESSION_SECURE_COOKIE
              value: "true"
            - name: TRUST_PROXY_HEADERS
              value: "true"
            - name: WATCH_NAMESPACES
              value: "analytics,payments"
          ports:
            - name: http
              containerPort: 3000
          # The same container port serves the signed-out shell, auth callbacks, and
          # authenticated API traffic. Expose /metrics only through the internal service.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
